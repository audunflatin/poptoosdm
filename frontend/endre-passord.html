<!DOCTYPE html>
<html lang="no" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>OSDMTools – Endre passord</title>

  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/favicon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/favicon-512x512.png">

  <link rel="stylesheet" href="/static/styles.css?v=13">
</head>
<body>

<nav class="sidebar">
  <a href="/" class="sidebar-brand"><span class="sidebar-to">OSDM</span>Tools</a>
  <div class="sidebar-nav">
    <a href="/" class="sidebar-link" data-i18n="nav_generate">Oppdater OSDM-priser</a>
    <a href="/osdmtoexcel" class="sidebar-link" data-i18n="nav_osdm_excel">OSDM → Excel</a>
    <a href="/fare-discount" class="sidebar-link" data-i18n="nav_fare_discount">Legg til rabatt</a>
    <a href="/kontakt" class="sidebar-link" data-i18n="nav_contact">Kontakt</a>
    <a href="/endre-passord" class="sidebar-link active" data-i18n="nav_change_password">Endre passord</a>
    <a id="adminLink" href="/admin/users" class="sidebar-link" data-i18n="nav_admin" style="display:none;">Admin</a>
    <div id="adminSubmenu" style="display:none; flex-direction:column; gap:1px;">
      <a href="/admin/users" class="sidebar-sublink" data-i18n="nav_admin_users">Brukere</a>
      <a href="/admin/log" class="sidebar-sublink" data-i18n="nav_admin_log">Logg</a>
    </div>
  </div>
</nav>

<header class="app-header">
  <span class="lang-selector">
    <button class="lang-btn" data-lang="no" onclick="setLanguage('no')" title="Norsk">🇳🇴</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')" title="English">🇬🇧</button>
    <button class="lang-btn" data-lang="de" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
    <button class="lang-btn" data-lang="sv" onclick="setLanguage('sv')" title="Svenska">🇸🇪</button>
    <span class="lang-sep">|</span>
    <a href="/logout" class="logout-button" data-i18n="logout">Logg ut</a>
  </span>
  <div style="display:flex; justify-content:center; align-items:center; padding:1rem 0 0;">
    <svg width="440" height="88" viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="22" r="9" fill="#ff5959"/>
      <line x1="23" y1="22" x2="35" y2="22" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-dasharray="3 2"/>
      <circle cx="44" cy="22" r="7" fill="none" stroke="white" stroke-width="2.5"/>
      <text x="60" y="29" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-weight="800" font-size="21" fill="white"><tspan fill="#ff5959">OSDM</tspan>Tools</text>
    </svg>
  </div>
</header>

<div class="container">
  <section class="panel" style="max-width:480px;">
    <h2 data-i18n="change_pw_title">Endre passord</h2>

    <div id="successMsg" style="display:none; background:rgba(90,195,154,0.12); border-left:4px solid #5ac39a; border-radius:4px; padding:0.875rem 1rem; color:#5ac39a; font-size:0.9rem; margin-bottom:1rem;"></div>
    <div id="errorMsg" class="validation-error" style="display:none;"></div>

    <form id="changeForm">
      <label data-i18n="change_pw_label">Nytt passord</label>
      <input id="password" type="password" required minlength="8" />

      <label data-i18n="change_pw_confirm">Bekreft passord</label>
      <input id="confirm" type="password" required minlength="8" />

      <button type="submit" data-i18n="change_pw_btn">Lagre passord</button>
    </form>
  </section>
</div>

<script src="/static/i18n.js?v=28"></script>
<script>
  if (window.IS_ADMIN) {
    const el = document.getElementById("adminLink"); if (el) el.style.display = "";
    const sub = document.getElementById("adminSubmenu"); if (sub) sub.style.display = "flex";
  }

  document.getElementById("changeForm").onsubmit = async e => {
    e.preventDefault();
    const successEl = document.getElementById("successMsg");
    const errorEl   = document.getElementById("errorMsg");
    successEl.style.display = "none";
    errorEl.style.display   = "none";

    const pw   = document.getElementById("password").value;
    const conf = document.getElementById("confirm").value;

    if (pw !== conf) {
      errorEl.textContent = t("change_pw_mismatch");
      errorEl.style.display = "block";
      return;
    }

    const fd = new FormData();
    fd.append("password", pw);
    fd.append("confirm",  conf);

    const r   = await fetch("/change-password", { method: "POST", body: fd });
    const res = await r.json().catch(() => ({}));

    if (r.ok) {
      successEl.textContent = t("change_pw_success");
      successEl.style.display = "block";
      document.getElementById("changeForm").reset();
    } else {
      errorEl.textContent = res.detail || t("unknown_error");
      errorEl.style.display = "block";
    }
  };
</script>
</body>
</html>
