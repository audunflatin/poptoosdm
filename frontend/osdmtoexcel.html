<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>PopToOSDM</title>

  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/favicon-192x192.png">

  <link rel="stylesheet" href="/static/styles.css?v=9">
</head>
<body>

<nav class="sidebar">
  <a href="/" class="sidebar-brand">Pop<span class="sidebar-to">To</span>OSDM</a>
  <div class="sidebar-nav">
    <a href="/" class="sidebar-link" data-i18n="nav_generate">Generer OSDM</a>
    <a href="/osdmtoexcel" class="sidebar-link active" data-i18n="nav_osdm_excel">OSDM → Excel</a>
    <a href="/fare-discount" class="sidebar-link" data-i18n="nav_fare_discount">Legg til rabatt</a>
    <a id="adminLink" href="/admin" class="sidebar-link" data-i18n="nav_admin" style="display:none;">Admin</a>
  </div>
</nav>

<header class="app-header">
  <span class="lang-selector">
    <button class="lang-btn" data-lang="no" onclick="setLanguage('no')" title="Norsk">🇳🇴</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')" title="English">🇬🇧</button>
    <button class="lang-btn" data-lang="de" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
    <button class="lang-btn" data-lang="sv" onclick="setLanguage('sv')" title="Svenska">🇸🇪</button>
    <span class="lang-sep">|</span>
    <a href="/logout" class="logout-button" data-i18n="logout">Logg ut</a>
  </span>
  <div style="display:flex; justify-content:center; align-items:center; padding:1rem 0 0;">
    <svg width="440" height="88" viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="22" r="9" fill="#ff5959"/>
      <line x1="23" y1="22" x2="35" y2="22" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-dasharray="3 2"/>
      <circle cx="44" cy="22" r="7" fill="none" stroke="white" stroke-width="2.5"/>
      <text x="60" y="29" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-weight="800" font-size="21" fill="white">Pop<tspan fill="#ff5959">To</tspan>OSDM</text>
    </svg>
  </div>
</header>

<div class="container">

  <section class="panel">
    <h2 data-i18n="section_upload">Last opp OSDM-fil</h2>
    <p style="margin-top:0;" data-i18n="upload_description">
      Last opp en generert OSDM fareDelivery JSON-fil. Filen konverteres til en Excel-fil med alle stasjonsrelasjoner og priser per billettkategori.
    </p>

    <label data-i18n="label_osdm_file">OSDM JSON-fil</label>
    <input id="osdmFile" type="file" accept=".json" />

    <div id="fileInfo" style="display:none; margin-top:0.75rem; color:#555; font-size:0.9rem;"></div>

    <button id="convertBtn" onclick="convert()" disabled style="margin-top:1.5rem;" data-i18n="btn_convert">
      Konverter til Excel
    </button>

    <div id="spinner" class="spinner"></div>
    <progress id="progressBar" style="display:none; width:100%; margin-top:1rem;"></progress>

    <div style="text-align:right; margin-top:0.25rem;">
      <span id="progressPercent" style="display:none; font-size:0.9rem; color:#0066cc; font-weight:600;"></span>
    </div>

    <div id="resultBox" style="display:none; margin-top:1.5rem;">
      <div id="resultStatus"></div>
      <button id="downloadBtn" onclick="download()" style="margin-top:1rem; display:none;" data-i18n="btn_download_excel">
        Last ned Excel
      </button>
    </div>
  </section>

  <!-- Kontaktskjema -->
  <section class="panel">
    <h2 data-i18n="contact_heading">Kontakt</h2>

    <div id="contactSuccess" style="display:none; background:rgba(90,195,154,0.12); border-left:4px solid #5ac39a; border-radius:4px; padding:0.875rem 1rem; color:#5ac39a; font-size:0.9rem;"></div>
    <div id="contactError" style="display:none; background:rgba(255,89,89,0.15); border-left:4px solid #ff5959; border-radius:4px; padding:0.875rem 1rem; color:#ff5959; font-size:0.9rem;"></div>

    <form id="contactForm">
      <label data-i18n="contact_name">Navn</label>
      <input id="contactName" type="text" required />

      <label data-i18n="contact_email">E-post</label>
      <input id="contactEmail" type="email" required />

      <label data-i18n="contact_message">Melding</label>
      <textarea id="contactMessage" rows="4" required
        style="width:100%; padding:0.65rem 0.875rem; margin-top:0.375rem; font-size:1rem; font-family:inherit; font-weight:500; color:#ffffff; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); border-radius:4px; resize:vertical;"
        data-i18n-placeholder="contact_placeholder"></textarea>

      <button type="submit" data-i18n="contact_btn">Send melding</button>
    </form>
  </section>

</div>

<script src="/static/i18n.js?v=16"></script>
<script src="/static/osdmtoExcel.js?v=3"></script>
<script>
  if (window.IS_ADMIN) document.getElementById("adminLink").style.display = "";

  document.getElementById("contactForm").onsubmit = async e => {
    e.preventDefault();
    const successEl = document.getElementById("contactSuccess");
    const errorEl   = document.getElementById("contactError");
    successEl.style.display = "none";
    errorEl.style.display   = "none";
    const fd = new FormData();
    fd.append("name",    document.getElementById("contactName").value);
    fd.append("email",   document.getElementById("contactEmail").value);
    fd.append("message", document.getElementById("contactMessage").value);
    const r   = await fetch("/contact", { method: "POST", body: fd });
    const res = await r.json().catch(() => ({}));
    if (res.ok) {
      successEl.textContent = t("contact_sent");
      successEl.style.display = "block";
      document.getElementById("contactForm").reset();
    } else {
      errorEl.textContent = t("contact_error");
      errorEl.style.display = "block";
    }
  };
</script>
</body>
</html>
