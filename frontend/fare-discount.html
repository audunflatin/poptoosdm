<!DOCTYPE html>
<html lang="no" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>OSDMTools – Legg til rabatt</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/favicon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/favicon-512x512.png">

  <!-- Styles -->
  <link rel="stylesheet" href="/static/styles.css?v=10">
  <style>
    .picker-wrap { position: relative; }
    .picker-dropdown {
      position: absolute; z-index: 100; top: calc(100% + 2px); left: 0; right: 0;
      background: #1e2a3a; border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px; max-height: 220px; overflow-y: auto;
    }
    .picker-option {
      padding: 7px 12px; cursor: pointer; font-size: 0.92rem;
      color: white; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .picker-option:last-child { border-bottom: none; }
    .picker-option:hover, .picker-option.active { background: rgba(255,255,255,0.12); }
    .picker-option .uic { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-left: 6px; }
    .picker-chip {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 6px;
      background: rgba(255,255,255,0.12); border-radius: 20px;
      padding: 4px 12px; font-size: 0.9rem; color: white;
    }
    .picker-chip button {
      background: none; border: none; color: rgba(255,255,255,0.5);
      cursor: pointer; padding: 0; font-size: 1rem; line-height: 1;
      display: inline-flex; align-items: center;
    }
    .picker-chip button:hover { color: #ff5959; }
    .checkbox-label {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: rgba(255,255,255,0.07); border-radius: 6px;
      padding: 5px 10px; font-size: 0.9rem; color: white; cursor: pointer;
      user-select: none;
    }
    .checkbox-label:hover { background: rgba(255,255,255,0.13); }
    .checkbox-label input[type=checkbox] { accent-color: #ff5959; width: 15px; height: 15px; }
    .toggle-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 8px 16px; font-size: 0.9rem;
      color: rgba(255,255,255,0.55); cursor: pointer; user-select: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .toggle-btn:hover { background: rgba(255,255,255,0.12); color: white; }
    .toggle-btn input[type=radio] { display: none; }
    .toggle-btn:has(input:checked) {
      background: rgba(255,89,89,0.18); border-color: #ff5959; color: white; font-weight: 600;
    }
    .btn-primary {
      background: #ff5959; color: white; border: none; border-radius: 8px;
      padding: 0.65rem 2rem; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    .btn-primary:hover { background: #e04444; }
    .btn-primary:disabled { opacity: 0.45; cursor: default; }
  </style>
</head>
<body>

<nav class="sidebar">
  <a href="/" class="sidebar-brand"><span class="sidebar-to">OSDM</span>Tools</a>
  <div class="sidebar-nav">
    <a href="/" class="sidebar-link" data-i18n="nav_generate">Generer OSDM</a>
    <a href="/osdmtoexcel" class="sidebar-link" data-i18n="nav_osdm_excel">OSDM → Excel</a>
    <a href="/fare-discount" class="sidebar-link active" data-i18n="nav_fare_discount">Legg til rabatt</a>
    <a href="/kontakt" class="sidebar-link" data-i18n="nav_contact">Kontakt</a>
    <a id="adminLink" href="/admin" class="sidebar-link" data-i18n="nav_admin" style="display:none;">Admin</a>
  </div>
</nav>

<header class="app-header">
  <span class="lang-selector">
    <button class="lang-btn" data-lang="no" onclick="setLanguage('no')" title="Norsk">🇳🇴</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')" title="English">🇬🇧</button>
    <button class="lang-btn" data-lang="de" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
    <button class="lang-btn" data-lang="sv" onclick="setLanguage('sv')" title="Svenska">🇸🇪</button>
    <span class="lang-sep">|</span>
    <a href="/logout" class="logout-button" data-i18n="logout">Logg ut</a>
  </span>
  <div style="display:flex; justify-content:center; align-items:center; padding:1rem 0 0;">
    <svg width="440" height="88" viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="22" r="9" fill="#ff5959"/>
      <line x1="23" y1="22" x2="35" y2="22" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-dasharray="3 2"/>
      <circle cx="44" cy="22" r="7" fill="none" stroke="white" stroke-width="2.5"/>
      <text x="60" y="29" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-weight="800" font-size="21" fill="white"><tspan fill="#ff5959">OSDM</tspan>Tools</text>
    </svg>
  </div>
</header>

<div class="container">
  <section class="panel">
    <h2 data-i18n="heading_fare_discount">Legg til rabatt</h2>
    <p style="color:rgba(255,255,255,0.6); margin-bottom:1.5rem;" data-i18n="fare_discount_desc">
      Last opp en OSDM fareDelivery JSON-fil for å legge til en ny rabattert fare.
    </p>

    <!-- Steg 1: Last opp fil -->
    <div id="stepUpload">
      <label data-i18n="label_osdm_file_discount">OSDM JSON-fil</label>
      <input id="discountFile" type="file" accept=".json" onchange="onFileChange()" />
      <div id="fileInfo" style="display:none; margin-top:0.5rem; color:rgba(255,255,255,0.6); font-size:0.9rem;"></div>
    </div>

    <!-- Steg 2: Skjema (skjult til fil er lastet) -->
    <div id="stepForm" style="display:none; margin-top:2rem;">
      <p id="parsedInfo" style="color:rgba(255,255,255,0.5); font-size:0.85rem; margin-bottom:1.5rem;"></p>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.25rem;">

        <!-- Fra-stasjon -->
        <div>
          <label>Fra stasjon</label>
          <div class="picker-wrap" id="wrapFrom">
            <input id="inputFrom" type="text" autocomplete="off"
              placeholder="Søk stasjonsnavn eller UIC…"
              oninput="pickerFilter('from')"
              onkeydown="pickerKey(event,'from')"
              onfocus="pickerOpen('from')" />
            <div id="dropFrom" class="picker-dropdown" style="display:none;"></div>
            <div id="chipFrom" style="display:none;"></div>
          </div>
          <input type="hidden" id="fromCpId" />
          <input type="hidden" id="fromUic" />
        </div>

        <!-- Til-stasjon -->
        <div>
          <label>Til stasjon</label>
          <div class="picker-wrap" id="wrapTo">
            <input id="inputTo" type="text" autocomplete="off"
              placeholder="Søk stasjonsnavn eller UIC…"
              oninput="pickerFilter('to')"
              onkeydown="pickerKey(event,'to')"
              onfocus="pickerOpen('to')" />
            <div id="dropTo" class="picker-dropdown" style="display:none;"></div>
            <div id="chipTo" style="display:none;"></div>
          </div>
          <input type="hidden" id="toCpId" />
          <input type="hidden" id="toUic" />
        </div>

      </div>

      <!-- Transportørbegrensning -->
      <div style="margin-top:1.5rem;">
        <label style="display:block; margin-bottom:0.5rem;">Transportørbegrensning</label>
        <div style="display:flex; gap:0.75rem; margin-bottom:0.75rem; flex-wrap:wrap;">
          <label class="toggle-btn">
            <input type="radio" name="carrierMode" value="none" checked onchange="onCarrierModeChange()">
            Ingen begrensning
          </label>
          <label class="toggle-btn">
            <input type="radio" name="carrierMode" value="specific" onchange="onCarrierModeChange()">
            Spesifikke transportører
          </label>
        </div>
        <div id="carrierPickerWrap" style="display:none;">
          <div class="picker-wrap" id="wrapCarrier">
            <input id="inputCarrier" type="text" autocomplete="off"
              placeholder="Søk transportørnavn eller RICS-kode…"
              oninput="carrierFilter()"
              onkeydown="carrierKey(event)"
              onfocus="carrierOpen()" />
            <div id="dropCarrier" class="picker-dropdown" style="display:none;"></div>
          </div>
          <div id="carrierChips" style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.5rem;"></div>
        </div>
      </div>

      <!-- Rabattnavn + rabattprosent -->
      <div style="display:grid; grid-template-columns:1fr 180px; gap:1.25rem; margin-top:1.25rem;">
        <div>
          <label>Rabattnavn</label>
          <input id="discountName" type="text" placeholder="f.eks. DSB-rabatt 20%" />
        </div>
        <div>
          <label>Rabatt (%)</label>
          <input id="discountPct" type="number" min="1" max="99" step="1" placeholder="f.eks. 20" />
        </div>
      </div>

      <!-- Passasjerkategorier -->
      <div style="margin-top:1.5rem;">
        <label style="margin-bottom:0.5rem; display:block;">Passasjerkategorier</label>
        <div id="passengerCheckboxes" style="display:flex; flex-wrap:wrap; gap:0.5rem 1.25rem;"></div>
      </div>

      <!-- Serviceklasser -->
      <div style="margin-top:1.5rem;">
        <label style="margin-bottom:0.5rem; display:block;">Serviceklasse</label>
        <div id="serviceClassCheckboxes" style="display:flex; flex-wrap:wrap; gap:0.5rem 1.25rem;"></div>
      </div>

      <!-- Submit -->
      <div style="margin-top:2rem;">
        <button id="applyBtn" onclick="applyDiscount()" class="btn-primary">Generer rabattert fil</button>
      </div>
    </div>

    <pre id="discountResult" style="margin-top:1.5rem;"></pre>
  </section>
</div>

<script src="/static/i18n.js?v=19"></script>
<script src="/static/fareDiscount.js?v=7"></script>
<script>if (window.IS_ADMIN) { const el = document.getElementById("adminLink"); if (el) el.style.display = ""; }</script>
</body>
</html>
