<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>OSDM til Excel – PopToOSDM</title>

  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/favicon-192x192.png">

  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<header class="app-header">
  <div class="logo-bar">
    <img src="/static/Enturlogo_Blue_RGB.svg" alt="Entur logo" class="logo" />
    <img src="/static/logo-uic-osdm.svg" alt="UIC logo" class="logo" />
  </div>
  <h1>OSDM til Excel</h1>
  <div>
    <a href="/logout" class="logout-button">Logg ut</a>
    <a href="/" style="color:var(--entur-blue); font-weight:600; text-decoration:none;">← PopToOSDM</a>
  </div>
</header>

<div class="container">

  <section class="panel">
    <h2>Last opp OSDM-fil</h2>
    <p style="color:#555; margin-top:0;">
      Last opp en generert OSDM fareDelivery JSON-fil. Filen konverteres til en Excel-fil med alle stasjonsrelasjoner og priser per billettkategori.
    </p>

    <label>OSDM JSON-fil</label>
    <input id="osdmFile" type="file" accept=".json" />

    <div id="fileInfo" style="display:none; margin-top:0.75rem; color:#555; font-size:0.9rem;"></div>

    <button id="convertBtn" onclick="convert()" disabled style="margin-top:1.5rem;">
      Konverter til Excel
    </button>

    <div id="spinner" class="spinner"></div>
    <progress id="progressBar" style="display:none; width:100%; margin-top:1rem;"></progress>
    
    <div style="text-align:right; margin-top:0.25rem;">
      <span id="progressPercent" style="display:none; font-size:0.9rem; color:#0066cc; font-weight:600;"></span>
    </div>

    <div id="resultBox" style="display:none; margin-top:1.5rem;">
      <div id="resultStatus"></div>
      <button id="downloadBtn" onclick="download()" style="margin-top:1rem; display:none;">
        Last ned Excel
      </button>
    </div>
  </section>

</div>

<script src="/static/osdmtoExcel.js?v=1"></script>
</body>
</html>
