<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>PopToOSDM</title>

  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/favicon-192x192.png">

  <link rel="stylesheet" href="/static/styles.css?v=2">
</head>
<body>

<header class="app-header">
  <span class="lang-selector">
    <button class="lang-btn" data-lang="no" onclick="setLanguage('no')" title="Norsk">🇳🇴</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')" title="English">🇬🇧</button>
    <button class="lang-btn" data-lang="de" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
  </span>
  <div class="logo-bar">
    <img src="/static/Enturlogo_Blue_RGB.svg" alt="Entur logo" class="logo" />
    <img src="/static/logo-uic-osdm.svg" alt="UIC logo" class="logo" />
  </div>
  <h1 data-i18n="heading_osdm_excel">OSDM til Excel</h1>
  <div class="header-controls">
    <a href="/" class="header-link" data-i18n="link_back">← PopToOSDM</a>
    <div class="header-right">
      <a href="/logout" class="logout-button" data-i18n="logout">Logg ut</a>
    </div>
  </div>
</header>

<div class="container">

  <section class="panel">
    <h2 data-i18n="section_upload">Last opp OSDM-fil</h2>
    <p style="color:#555; margin-top:0;" data-i18n="upload_description">
      Last opp en generert OSDM fareDelivery JSON-fil. Filen konverteres til en Excel-fil med alle stasjonsrelasjoner og priser per billettkategori.
    </p>

    <label data-i18n="label_osdm_file">OSDM JSON-fil</label>
    <input id="osdmFile" type="file" accept=".json" />

    <div id="fileInfo" style="display:none; margin-top:0.75rem; color:#555; font-size:0.9rem;"></div>

    <button id="convertBtn" onclick="convert()" disabled style="margin-top:1.5rem;" data-i18n="btn_convert">
      Konverter til Excel
    </button>

    <div id="spinner" class="spinner"></div>
    <progress id="progressBar" style="display:none; width:100%; margin-top:1rem;"></progress>

    <div style="text-align:right; margin-top:0.25rem;">
      <span id="progressPercent" style="display:none; font-size:0.9rem; color:#0066cc; font-weight:600;"></span>
    </div>

    <div id="resultBox" style="display:none; margin-top:1.5rem;">
      <div id="resultStatus"></div>
      <button id="downloadBtn" onclick="download()" style="margin-top:1rem; display:none;" data-i18n="btn_download_excel">
        Last ned Excel
      </button>
    </div>
  </section>

</div>

<script src="/static/i18n.js"></script>
<script src="/static/osdmtoExcel.js?v=3"></script>
</body>
</html>
