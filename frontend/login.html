<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/static/styles.css">
  <title>PopToOSDM</title>
  <style>
    body {
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 360px;
    }

    h1 {
      margin-top: 0;
      text-align: center;
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 0.5rem;
      margin-top: 0.25rem;
    }

    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.6rem;
      background: #0066cc;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Språkvelger øverst til høyre -->
  <div class="lang-selector-fixed">
    <button class="lang-btn" data-lang="no" onclick="setLanguage('no')" title="Norsk">🇳🇴</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')" title="English">🇬🇧</button>
    <button class="lang-btn" data-lang="de" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
  </div>

  <form class="login-box" method="post" action="/login">
    <h1>PopToOSDM</h1>

    <label for="email" data-i18n="label_email">E‑post</label>
    <input id="email" name="email" type="email" required />

    <label for="password" data-i18n="label_password">Passord</label>
    <input id="password" name="password" type="password" required />

    <button type="submit" data-i18n="btn_login">Logg inn</button>
  </form>

<script src="/static/i18n.js"></script>
</body>
</html>
