<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/static/styles.css?v=4">
  <title>PopToOSDM – Bytt passord</title>
  <style>
    body {
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .login-box {
      background: white;
      padding: 2rem 2.5rem;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      width: 380px;
    }
    h1 { margin-top: 0; text-align: center; font-size: 1.3rem; }
    .notice {
      background: #fff8e1;
      border: 1px solid #f5a623;
      border-radius: 6px;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: #7a4f00;
    }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input { width: 100%; padding: 0.5rem; margin-top: 0.25rem; box-sizing: border-box; }
    button {
      margin-top: 1.5rem;
      width: 100%;
      padding: 0.6rem;
      background: #0066cc;
      border: none;
      border-radius: 6px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    .error-msg {
      color: #a32626;
      background: #fdecea;
      border: 1px solid #e74c3c;
      border-radius: 6px;
      padding: 0.6rem 1rem;
      margin-top: 1rem;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1 data-i18n="change_pw_title">Velg nytt passord</h1>
    <p class="notice" data-i18n="change_pw_notice">Du må velge et nytt passord før du kan fortsette.</p>

    <div id="errorMsg" class="error-msg"></div>

    <form id="changeForm">
      <label for="password" data-i18n="change_pw_label">Nytt passord</label>
      <input id="password" name="password" type="password" required minlength="8" />

      <label for="confirm" data-i18n="change_pw_confirm">Bekreft passord</label>
      <input id="confirm" name="confirm" type="password" required minlength="8" />

      <button type="submit" data-i18n="change_pw_btn">Lagre passord</button>
    </form>
  </div>

  <script src="/static/i18n.js?v=5"></script>
  <script>
    const form = document.getElementById("changeForm");
    const errorMsg = document.getElementById("errorMsg");

    form.onsubmit = async e => {
      e.preventDefault();
      errorMsg.style.display = "none";
      const pw = document.getElementById("password").value;
      const conf = document.getElementById("confirm").value;
      if (pw !== conf) {
        errorMsg.textContent = t("change_pw_mismatch");
        errorMsg.style.display = "block";
        return;
      }
      const fd = new FormData();
      fd.append("password", pw);
      fd.append("confirm", conf);
      const r = await fetch("/change-password", { method: "POST", body: fd });
      if (r.ok) {
        window.location.href = "/";
      } else {
        const res = await r.json().catch(() => ({}));
        errorMsg.textContent = res.detail || t("unknown_error");
        errorMsg.style.display = "block";
      }
    };
  </script>
</body>
</html>
