<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/static/styles.css?v=10">
  <title>PopToOSDM – Nytt passord</title>
  <style>
    body { display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .login-box {
      background:#1e2468; padding:2.5rem; border-radius:8px;
      border:1px solid rgba(255,255,255,0.12); border-top:3px solid #ff5959; width:400px;
    }
    .login-box h1 {
      margin:0 0 1.5rem; text-align:center; font-size:1.6rem;
      font-weight:800; color:#ff5959; letter-spacing:-0.02em;
    }
    .login-box button[type="submit"] {
      width:100%; margin-top:2rem; padding:0.7rem; font-size:1rem;
      background:#ff5959; border:2px solid #ff5959; color:white;
      border-radius:4px; cursor:pointer; font-weight:700;
    }
    .login-box button[type="submit"]:hover { background:#e03e3e; border-color:#e03e3e; }
    .error-msg {
      background:rgba(255,89,89,0.15); border-left:4px solid #ff5959;
      border-radius:4px; padding:0.6rem 1rem; margin-top:1rem;
      color:#ff5959; font-weight:600; font-size:0.875rem; display:none;
    }
  </style>
</head>
<body>
  <div class="lang-selector-fixed">
    <button class="lang-btn" data-lang="no" onclick="setLanguage('no')" title="Norsk">🇳🇴</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')" title="English">🇬🇧</button>
    <button class="lang-btn" data-lang="de" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
    <button class="lang-btn" data-lang="sv" onclick="setLanguage('sv')" title="Svenska">🇸🇪</button>
  </div>

  <div class="login-box">
    <div style="display:flex; justify-content:center; margin-bottom:1.5rem;">
      <svg width="300" height="60" viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg">
        <circle cx="14" cy="22" r="9" fill="#ff5959"/>
        <line x1="23" y1="22" x2="35" y2="22" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-dasharray="3 2"/>
        <circle cx="44" cy="22" r="7" fill="none" stroke="white" stroke-width="2.5"/>
        <text x="60" y="29" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-weight="800" font-size="21" fill="white">Pop<tspan fill="#ff5959">To</tspan>OSDM</text>
      </svg>
    </div>

    <h1 data-i18n="reset_pw_title">Velg nytt passord</h1>

    <div id="errorMsg" class="error-msg"></div>

    <form id="resetForm">
      <input type="hidden" id="token" value="__TOKEN__" />
      <label for="password" data-i18n="change_pw_label">Nytt passord</label>
      <input id="password" name="password" type="password" required minlength="8" />
      <label for="confirm" data-i18n="change_pw_confirm">Bekreft passord</label>
      <input id="confirm" name="confirm" type="password" required minlength="8" />
      <button type="submit" data-i18n="change_pw_btn">Lagre passord</button>
    </form>
  </div>

  <script src="/static/i18n.js?v=19"></script>
  <script>
    const form = document.getElementById("resetForm");
    const errorMsg = document.getElementById("errorMsg");

    form.onsubmit = async e => {
      e.preventDefault();
      errorMsg.style.display = "none";
      const pw = document.getElementById("password").value;
      const conf = document.getElementById("confirm").value;
      if (pw !== conf) {
        errorMsg.textContent = t("change_pw_mismatch");
        errorMsg.style.display = "block";
        return;
      }
      const token = document.getElementById("token").value;
      const fd = new FormData();
      fd.append("password", pw);
      fd.append("confirm", conf);
      const r = await fetch(`/reset-password/${token}`, { method: "POST", body: fd });
      if (r.ok) {
        window.location.href = "/";
      } else {
        const res = await r.json().catch(() => ({}));
        errorMsg.textContent = res.detail || t("unknown_error");
        errorMsg.style.display = "block";
      }
    };
  </script>
</body>
</html>
