<!DOCTYPE html>
<html lang="no" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>OSDMTools</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/static/favicon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/favicon-512x512.png">

  <!-- Styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="/static/styles.css?v=13">
</head>
<body>

<nav class="sidebar">
  <a href="/" class="sidebar-brand"><span class="sidebar-to">OSDM</span>Tools</a>
  <div class="sidebar-nav">
    <a href="/" class="sidebar-link active" data-i18n="nav_generate">Generer OSDM</a>
    <a href="/osdmtoexcel" class="sidebar-link" data-i18n="nav_osdm_excel">OSDM → Excel</a>
    <a href="/fare-discount" class="sidebar-link" data-i18n="nav_fare_discount">Legg til rabatt</a>
    <a href="/kontakt" class="sidebar-link" data-i18n="nav_contact">Kontakt</a>
    <a href="/endre-passord" class="sidebar-link" data-i18n="nav_change_password">Endre passord</a>
    <a id="adminLink" href="/admin/users" class="sidebar-link" data-i18n="nav_admin" style="display:none;">Admin</a>
    <div id="adminSubmenu" style="display:none; flex-direction:column; gap:1px;">
      <a href="/admin/users" class="sidebar-sublink" data-i18n="nav_admin_users">Brukere</a>
      <a href="/admin/log" class="sidebar-sublink" data-i18n="nav_admin_log">Logg</a>
    </div>
  </div>
</nav>

<header class="app-header">
  <span class="lang-selector">
    <button class="lang-btn" data-lang="no" onclick="setLanguage('no')" title="Norsk">🇳🇴</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')" title="English">🇬🇧</button>
    <button class="lang-btn" data-lang="de" onclick="setLanguage('de')" title="Deutsch">🇩🇪</button>
    <button class="lang-btn" data-lang="sv" onclick="setLanguage('sv')" title="Svenska">🇸🇪</button>
    <span class="lang-sep">|</span>
    <a href="/logout" class="logout-button" data-i18n="logout">Logg ut</a>
  </span>
  <div style="display:flex; justify-content:center; align-items:center; padding:1rem 0 0;">
    <svg width="440" height="88" viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="22" r="9" fill="#ff5959"/>
      <line x1="23" y1="22" x2="35" y2="22" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-dasharray="3 2"/>
      <circle cx="44" cy="22" r="7" fill="none" stroke="white" stroke-width="2.5"/>
      <text x="60" y="29" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-weight="800" font-size="21" fill="white"><tspan fill="#ff5959">OSDM</tspan>Tools</text>
    </svg>
  </div>
</header>

<div class="container">

  <section class="panel">
    <h2 data-i18n="section_generate">Generer OSDM</h2>
    <p style="margin-top:0; color:rgba(255,255,255,0.6);" data-i18n="generate_desc">
      Last opp avstandsfilen for å komme i gang.
    </p>

    <!-- Steg 1: Avstandsfil (TEN-CSV) -->
    <label data-i18n="label_ten_csv">Avstandsfil</label>
    <input id="tenFile" type="file" accept=".csv" onchange="validateTen()" />
    <div id="spinnerTen" class="spinner"></div>
    <pre id="tenStatus"></pre>

    <!-- Steg 2: OSDM-fil for validering (vises etter TEN validert) -->
    <div id="stepOsdm" style="display:none;">
      <hr class="step-sep">
      <label data-i18n="label_osdm_val_file">OSDM-fil</label>
      <input id="osdmValFile" type="file" accept=".json" onchange="validateOsdm()" />
      <div id="spinnerOsdmVal" class="spinner"></div>
      <div id="osdmSummary"></div>
      <div id="osdmWarnings"></div>
      <div id="spinnerDistances" class="spinner"></div>
      <div id="distanceSummary"></div>
    </div>

    <!-- Steg 3: Genereringsform (vises etter OSDM validert) -->
    <div id="generateForm" style="display:none;">
      <hr class="step-sep">

      <label data-i18n="label_delivery_id">DeliveryId</label>
      <input id="datasetId" type="text" required />

      <label data-i18n="label_previous_delivery_id">Previous DeliveryId <span style="opacity:0.5;font-weight:normal;">(valgfri)</span></label>
      <input id="previousDeliveryId" type="text" data-i18n-placeholder="placeholder_previous_delivery_id" placeholder="Autofylles fra opplastet OSDM-fil" />

      <label data-i18n="label_environment">Miljø</label>
      <select id="environment">
        <option value="prod" data-i18n="opt_production">Produksjon</option>
        <option value="test" data-i18n="opt_test">Test</option>
      </select>

      <label data-i18n="label_optional_delivery">Optional delivery</label>
      <select id="optionalDelivery">
        <option value="false" selected data-i18n="opt_no">Nei</option>
        <option value="true" data-i18n="opt_yes">Ja</option>
      </select>

      <label data-i18n="label_distance_currency">Valuta i avstandsfilen</label>
      <select id="distanceCurrency" onchange="onCurrencyChange()">
        <option value="EUR" selected data-i18n="opt_eur">Euro (EUR)</option>
        <option value="NOK" data-i18n="opt_nok">Norske kroner (NOK)</option>
        <option value="SEK" data-i18n="opt_sek">Svenske kroner (SEK)</option>
        <option value="DKK" data-i18n="opt_dkk">Danske kroner (DKK)</option>
        <option value="GBP" data-i18n="opt_gbp">Britiske pund (GBP)</option>
        <option value="CHF" data-i18n="opt_chf">Sveitserfranc (CHF)</option>
        <option value="BGN" data-i18n="opt_bgn">Bulgarske lev (BGN)</option>
        <option value="CZK" data-i18n="opt_czk">Tsjekkiske koruna (CZK)</option>
        <option value="HUF" data-i18n="opt_huf">Ungarske forint (HUF)</option>
        <option value="ISK" data-i18n="opt_isk">Islandske kroner (ISK)</option>
        <option value="PLN" data-i18n="opt_pln">Polske zloty (PLN)</option>
        <option value="RON" data-i18n="opt_ron">Rumenske leu (RON)</option>
        <option value="TRY" data-i18n="opt_try">Tyrkiske lira (TRY)</option>
      </select>

      <label id="exchangeRateLabel" data-i18n="label_exchange_rate_eur">Valutakurs EUR → EUR</label>
      <div class="rate-row">
        <input id="exchangeRate" type="number" step="0.0001" value="1" required />
        <button type="button" class="btn-sm" onclick="fetchExchangeRate()" data-i18n="btn_fetch_rate">Hent live</button>
      </div>
      <div id="rateStatus"></div>

      <label data-i18n="label_valid_from">Gyldig fra</label>
      <input id="validFrom" type="date" required />

      <label data-i18n="label_valid_to">Gyldig til</label>
      <input id="validTo" type="date" required />

      <div id="validationError" class="validation-error" style="display:none;"></div>

      <button id="generateBtn" onclick="generateOsdm()" disabled data-i18n="btn_generate">
        Generer OSDM JSON
      </button>

      <div id="spinnerGenerate" class="spinner"></div>
      <progress id="progressBar" value="0" max="100" style="display:none;"></progress>
      <br />
      <div id="resultBox" class="status-ok" style="display:none;">
        <div id="finalStatus" class="result-text"></div>
        <div id="examplePanel"></div>
      </div>

      <button id="downloadBtn" onclick="downloadOsdm()" disabled data-i18n="btn_download">
        Last ned OSDM JSON
      </button>

      <button id="downloadExcelBtn" onclick="downloadAsExcel()" disabled data-i18n="btn_download_excel">
        Last ned Excel
      </button>
      <div id="spinnerExcel" class="spinner"></div>

    </div>
  </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/no.js"></script>
<script src="/static/i18n.js?v=28"></script>
<script src="/static/app.js?v=14"></script>
</body>
</html>
