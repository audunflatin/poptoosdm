<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>PopToOSDM</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<header class="app-header">
  <div class="logo-bar">
    <img src="/static/Enturlogo_Blue_RGB.svg" alt="Entur logo" class="logo" />
    <img src="/static/logo-uic-osdm.svg" alt="UIC logo" class="logo" />
  </div>
  <h1>PopToOSDM</h1>
  <div>
    <a href="/logout" class="logout-button">Logg ut</a>
  </div>
</header>

<div class="container">

  <!-- 1. INPUT -->
  <section class="panel">
    <h2>1. Input</h2>
    <label>TEN‑CSV</label>
    <input id="tenFile" type="file" accept=".csv" onchange="validateTen()" />
    <div id="spinnerTen" class="spinner"></div>
    <pre id="tenStatus"></pre>
  </section>

  <!-- 2. GENERER -->
  <section class="panel">
    <h2>2. Generer OSDM</h2>

    <label>DeliveryId</label>
    <input id="datasetId" type="text" required />

    <label>Miljø</label>
    <select id="environment">
      <option value="prod">Produksjon</option>
      <option value="test">Test</option>
    </select>

    <label>Optional delivery</label>
    <select id="optionalDelivery">
      <option value="false" selected>Nei</option>
      <option value="true">Ja</option>
    </select>

    <label>Valutakurs NOK → EUR</label>
    <input id="exchangeRate" type="number" step="0.0001" value="0.091" required />

    <label>Gyldig fra</label>
    <input id="validFrom" type="date" required />

    <label>Gyldig til</label>
    <input id="validTo" type="date" required />

    <button id="generateBtn" onclick="generateOsdm()" disabled>
      Generer OSDM JSON
    </button>

    <div id="spinnerOsdm" class="spinner"></div>
    <progress id="progressBar" value="0" max="100" style="display:none;"></progress>

    <pre id="finalStatus"></pre>
    <div id="exampleTable"></div>

    <button id="downloadBtn" onclick="downloadOsdm()" disabled>
      Last ned OSDM JSON
    </button>
  </section>
</div>

<hr />

<!-- ADMIN -->
<div class="admin-only">
  <h2>Admin – legg til bruker</h2>
  <form id="addUserForm">
    <input id="newUserEmail" type="email" placeholder="E‑post" required />
    <button type="submit">Legg til bruker</button>
  </form>
  <pre id="addUserResult"></pre>

  <h2>Admin – regenerer passord</h2>
  <form id="resetPasswordForm">
    <input id="resetUserEmail" type="email" placeholder="E‑post" required />
    <button type="submit">Regenerer passord</button>
  </form>
  <pre id="resetPasswordResult"></pre>
</div>

<script>
let lastGeneratedFile = null;

function show(id){document.getElementById(id).style.display="block";}
function hide(id){document.getElementById(id).style.display="none";}

function validateGenerateInputs() {
  if (!datasetId.value.trim()) { alert("DeliveryId mangler"); return false; }
  if (!validFrom.value || !validTo.value) { alert("Gyldighetsdato mangler"); return false; }
  if (validFrom.value > validTo.value) { alert("Gyldig fra > gyldig til"); return false; }
  return true;
}

async function validateTen() {
  show("spinnerTen");
  const fd = new FormData();
  fd.append("tenFile", tenFile.files[0]);
  const r = await fetch("/ui/validate-ten",{method:"POST",body:fd});
  const res = await r.json();
  hide("spinnerTen");
  tenStatus.innerText = JSON.stringify(res,null,2);
  tenStatus.className = res.ok ? "status-ok" : "status-error";
  generateBtn.disabled = !res.ok;
}

async function generateOsdm(){
  if(!validateGenerateInputs()) return;

  show("spinnerOsdm");
  startProgress();

  const fd=new FormData();
  ["exchangeRate","validFrom","validTo","datasetId","environment","optionalDelivery"]
    .forEach(id=>fd.append(id,document.getElementById(id).value));

  const r=await fetch("/ui/generate-osdm",{method:"POST",body:fd});
  const res=await r.json();
  hide("spinnerOsdm");

  if(res.ok && res.outputFile){
    lastGeneratedFile=res.outputFile;
    finalStatus.innerText=
      `✅ OSDM generert\n`+
      `Fil: ${res.outputFile}\n`+
      `Antall priser: ${res.summary.pricesUpdated}\n`+
      `Miljø: ${res.summary.environment}`;
    finalStatus.className="status-ok";
    downloadBtn.disabled=false;
    renderExampleTable(res.summary.exampleFares);
  } else {
    finalStatus.innerText="❌ OSDM kunne ikke genereres";
    finalStatus.className="status-error";
  }
}

function downloadOsdm(){
  window.location.href=`/ui/download-osdm/${lastGeneratedFile}`;
}

function startProgress(){
  const bar=progressBar;
  bar.style.display="block";
  const t=setInterval(async()=>{
    const p=(await (await fetch("/ui/progress")).json());
    bar.value=p.percent;
    if(p.status==="done"){clearInterval(t);bar.style.display="none";}
  },500);
}

function renderExampleTable(data){
  if(!data){exampleTable.innerHTML="";return;}
  let h="<table class='example-table'><tr><th>#</th><th>Strekning</th><th>Pris</th><th>Km</th></tr>";
  let i=1;
  for(const v of Object.values(data)){
    const [r,rest]=v.split(": ");
    const [p,km]=rest.split(" (");
    h+=`<tr><td>${i++}</td><td>${r}</td><td>${p}</td><td>${km.replace(")","")}</td></tr>`;
  }
  exampleTable.innerHTML=h+"</table>";
}

if(!window.IS_ADMIN){
  document.querySelectorAll(".admin-only").forEach(e=>e.style.display="none");
}

addUserForm.onsubmit=async e=>{
  e.preventDefault();
  const fd=new FormData(); fd.append("email",newUserEmail.value);
  const r=await fetch("/admin/add-user",{method:"POST",body:fd});
  addUserResult.innerText=JSON.stringify(await r.json(),null,2);
};

resetPasswordForm.onsubmit=async e=>{
  e.preventDefault();
  const fd=new FormData(); fd.append("email",resetUserEmail.value);
  const r=await fetch("/admin/reset-password",{method:"POST",body:fd});
  resetPasswordResult.innerText=JSON.stringify(await r.json(),null,2);
};
</script>

</body>
</html>
