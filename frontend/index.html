<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>PopToOSDM</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<header class="app-header">
  <div class="logo-bar">
    <img src="/static/Enturlogo_Blue_RGB.svg" alt="Entur logo" class="logo" />
    <img src="/static/logo-uic-osdm.svg" alt="UIC logo" class="logo" />
  </div>
  <h1>PopToOSDM</h1>
  
<div>
  <a href="/logout" class="logout-button">Logg ut</a>
</div>

</header>

<div class="container">
  
  <!-- 1. INPUT -->
  <section class="panel">
    <h2>1. Input</h2>

    <label>TEN‑CSV</label>
    <input id="tenFile" type="file" accept=".csv" onchange="validateTen()" />
    <div id="spinnerTen" class="spinner"></div>
    <pre id="tenStatus"></pre>
  </section>

  <!-- 2. GENERER -->
  <section class="panel">
    <h2>2. Generer OSDM</h2>

    <label>DeliveryId (må økes ved ny levering)</label>
    <input id="datasetId" type="text" required />

    <label>Miljø</label>
    <select id="environment">
      <option value="prod">Produksjon</option>
      <option value="test">Test</option>
    </select>

    <label>Optional delivery</label>
    <select id="optionalDelivery">
      <option value="false" selected>Nei</option>
      <option value="true">Ja</option>
    </select>

    <label>Valutakurs NOK → EUR</label>
    <input id="exchangeRate" type="number" step="0.0001" value="0.091" required />

    <label>Gyldig fra</label>
    <input id="validFrom" type="date" required />

    <label>Gyldig til</label>
    <input id="validTo" type="date" required/>

    <div id="validationError" class="validation-error" style="display:none;"></div>
    <button id="generateBtn" onclick="generateOsdm()" disabled>
      Generer OSDM JSON
    </button>

    <div id="spinnerOsdm" class="spinner"></div>
    <progress id="progressBar" value="0" max="100" style="width:100%; display:none;"></progress>
    <pre id="finalStatus" class="status-output"></pre>
    <div id="exampleTable"></div>
    
    <button id="downloadBtn" onclick="downloadOsdm()" disabled>
      Last ned OSDM JSON
    </button>

  </section>

</div>
<hr />
<div class="admin-only">
<h2>Admin – legg til bruker</h2>

<form id="addUserForm">
  <label for="newUserEmail">E‑post</label>
  <input id="newUserEmail" type="email" required />

  <button type="submit">Legg til bruker</button>
</form>

<pre id="addUserResult"></pre>

<script>
document.getElementById("addUserForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("newUserEmail").value;
  const resultEl = document.getElementById("addUserResult");

  const fd = new FormData();
  fd.append("email", email);

  const r = await fetch("/admin/add-user", {
    method: "POST",
    body: fd
  });

  const data = await r.json();

  if (!r.ok) {
    resultEl.innerText = data.detail || "Feil";
    return;
  }

  resultEl.innerText =
    `✅ Bruker opprettet\nE‑post: ${data.email}\nPassord: ${data.password}`;
});
</script>
<hr />

<h2>Admin – regenerer passord</h2>

<form id="resetPasswordForm">
  <label for="resetUserEmail">E‑post</label>
  <input id="resetUserEmail" type="email" required />

  <button type="submit">Regenerer passord</button>
</form>

<pre id="resetPasswordResult"></pre>

<script>
document.getElementById("resetPasswordForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("resetUserEmail").value;
  const resultEl = document.getElementById("resetPasswordResult");

  const fd = new FormData();
  fd.append("email", email);

  const r = await fetch("/admin/reset-password", {
    method: "POST",
    body: fd
  });

  const data = await r.json();

  if (!r.ok) {
    resultEl.innerText = data.detail || "Feil ved passord‑regenerering";
    return;
  }

  resultEl.innerText =
    `✅ Passord regenerert\nE‑post: ${data.email}\nNytt passord: ${data.new_password}`;
});
</script>
</div>

<script>
  if (!window.IS_ADMIN) {
    document.querySelectorAll(".admin-only").forEach(el => {
      el.style.display = "none";
    });
  }
</script>

</body>
</html>
<script>
let lastGeneratedFile = null;
function show(id) { document.getElementById(id).style.display = "block"; }
function hide(id) { document.getElementById(id).style.display = "none"; }

async function validateTen() {
  const fileInput = document.getElementById("tenFile");
  const tenStatusEl = document.getElementById("tenStatus");
  const generateBtn = document.getElementById("generateBtn");

  // Reset status
  tenStatusEl.classList.remove("status-ok", "status-error");
  generateBtn.disabled = true;

  // ✅ Ingen alert – vis inline feilmelding
  if (!fileInput.files || fileInput.files.length === 0) {
    tenStatusEl.innerText =
      "1. Validering TEN-tabell\n2. status: FEIL\n3. melding: Velg TEN-CSV først";
    tenStatusEl.classList.add("status-error");
    return;
  }

  show("spinnerTen");

  const fd = new FormData();
  fd.append("tenFile", fileInput.files[0]);

  const r = await fetch("/ui/validate-ten", {
    method: "POST",
    body: fd
  });

  const response = await r.json();
  hide("spinnerTen");

  // ✅ Nummerert og konsistent visning
  tenStatusEl.innerText = renderNumberedList(response);

  tenStatusEl.classList.remove("status-ok", "status-error");

  if (response.ok === true) {
    tenStatusEl.classList.add("status-ok");
    generateBtn.disabled = false;
  } else {
    tenStatusEl.classList.add("status-error");
    generateBtn.disabled = true;
  }
}



async function generateOsdm() {
  if (!validateInputs()) {
    return;
  }

  show("spinnerOsdm");
  startProgress();

  const fd = new FormData();
  fd.append("exchangeRate", document.getElementById("exchangeRate").value);
  fd.append("validFrom", document.getElementById("validFrom").value);
  fd.append("validTo", document.getElementById("validTo").value);
  fd.append("datasetId", document.getElementById("datasetId").value);
  fd.append("environment", document.getElementById("environment").value);
  fd.append("optionalDelivery", document.getElementById("optionalDelivery").value);

  const r = await fetch("/ui/generate-osdm", {
    method: "POST",
    body: fd
  });

  const response = await r.json();
  lastGeneratedFile = response.outputFile;

  hide("spinnerOsdm");

  const statusEl = document.getElementById("finalStatus");
  const downloadBtn = document.getElementById("downloadBtn");

  // ✅ Lag kopi av response uten exampleFares for statusvisning
  const responseForStatus = JSON.parse(JSON.stringify(response));
  if (responseForStatus.summary) {
    delete responseForStatus.summary.exampleFares;
  }

  // ✅ Vis nummerert status
  statusEl.innerText = renderNumberedList(responseForStatus);

  // ✅ Statusfarger
  statusEl.classList.remove("status-ok", "status-error");
  if (response.status === "OK") {
    statusEl.classList.add("status-ok");
  } else {
    statusEl.classList.add("status-error");
  }

  // ✅ Eksempelpriser vises KUN som tabell
  renderExampleTable(response.summary?.exampleFares);

  // ✅ Aktiver / deaktiver nedlasting
  if (response.status === "OK") {
    downloadBtn.disabled = false;


}
}



function downloadOsdm() {
  const file = lastGeneratedFile;
  window.location.href =
    `http://127.0.0.1:8000/ui/download-osdm/${file}`;
}


async function loadSummary() {
  const r = await fetch("/ui/summary");
  document.getElementById("summaryStatus").innerText =
    renderNumberedList(await r.json());
}


function renderNumberedList(obj, level = 1) {
  let out = "";
  let index = 1;

  for (const [key, value] of Object.entries(obj)) {
    const prefix = `${level}.${index}`;

    if (typeof value === "object" && value !== null && !Array.isArray(value)) {
      out += `${prefix} ${key}:\n`;
      out += renderNumberedList(value, level + 1);
    } else if (Array.isArray(value)) {
      out += `${prefix} ${key}:\n`;
      value.forEach((v, i) => {
        out += `${level + 1}.${i + 1} ${v}\n`;
      });
    } else {
      out += `${prefix} ${key}: ${value}\n`;
    }

    index++;
  }

  return out;
}


let progressTimer = null;

function startProgress() {
  const bar = document.getElementById("progressBar");
  bar.value = 0;
  bar.style.display = "block";

  progressTimer = setInterval(async () => {
    const r = await fetch("/ui/progress");
    const p = await r.json();

    bar.value = p.percent;

    if (p.status === "done") {
      clearInterval(progressTimer);
      bar.value = 100;
      setTimeout(() => {
        bar.style.display = "none";
      }, 800);
    }
  }, 500);
}
function renderExampleTable(exampleFares) {
  if (!exampleFares || Object.keys(exampleFares).length === 0) {
    document.getElementById("exampleTable").innerHTML = "";
    return;
  }

  let html = `
    <table class="example-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Strekning</th>
          <th>Pris</th>
          <th>Avstand</th>
        </tr>
      </thead>
      <tbody>
  `;

  let idx = 1;
  for (const value of Object.values(exampleFares)) {
    // value = "Oslo S → Bergen stasjon: 114.40 EUR (502 km)"
    const [routePart, rest] = value.split(": ");
    const [pricePart, kmPart] = rest.split(" (");

    html += `
      <tr>
        <td>${idx}</td>
        <td>${routePart}</td>
        <td>${pricePart}</td>
        <td>${kmPart.replace(")", "")}</td>
      </tr>
    `;
    idx++;
  }

  html += "</tbody></table>";
  document.getElementById("exampleTable").innerHTML = html;
}

function validateInputs() {
  const deliveryId = document.getElementById("datasetId").value.trim();
  const exchangeRate = parseFloat(document.getElementById("exchangeRate").value);
  const validFrom = document.getElementById("validFrom").value;
  const validTo = document.getElementById("validTo").value;

  const errorEl = document.getElementById("validationError");

  // Reset
  errorEl.style.display = "none";
  errorEl.innerText = "";

  if (!deliveryId) {
    errorEl.innerText = "DeliveryId må være utfylt.";
  } else if (!exchangeRate || exchangeRate <= 0) {
    errorEl.innerText = "Valutakurs må være større enn 0.";
  } else if (!validFrom || !validTo) {
    errorEl.innerText = "Gyldig fra og til må settes.";
  } else if (validFrom > validTo) {
    errorEl.innerText = "Gyldig fra kan ikke være etter gyldig til.";
  }

  if (errorEl.innerText) {
    errorEl.style.display = "block";
    return false;
  }

  return true;
}

["datasetId", "exchangeRate", "validFrom", "validTo"].forEach(id => {
  document.getElementById(id).addEventListener("input", () => {
    document.getElementById("validationError").style.display = "none";
  });
});


</script>

</body>
</html>
