<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>PopToOSDM</title>
  <link rel="les.css
</head>
<body>

<header class="app-header">
  <div class="logo-bar">
    <img src="/static/Enturlogo_Blue_RGB.svg" alt="tatic/logo-uic-osdm.svg" alt="UIC logo</h1>

  <div>
    /logoutLogg ut</a>
  </div>
</header>

<div class="container">

  <!-- 1. INPUT -->
  <section class="panel">
    <h2>1. Input</h2>

    <label>TEN‑CSV</label>
    <input id="tenFile" type="file" accept=".csv" onchange="validateTen()" />
    <div id="spinnerTen" class="spinner"></div>
    <pre id="tenStatus"></pre>
  </section>

  <!-- 2. GENERER -->
  <section class="panel">
    <h2>2. Generer OSDM</h2>

    <label>DeliveryId</label>
    <input id="datasetId" type="text" required />

    <label>Miljø</label>
    <select id="environment">
      <option value="prod">Produksjon</option>
      <option value="test">Test</option>
    </select>

    <label>Valutakurs NOK → EUR</label>
    <input id="exchangeRate" type="number" step="0.0001" value="0.091" required />

    <label>Gyldig fra</label>
    <input id="validFrom" type="date" required />

    <label>Gyldig til</label>
    <input id="validTo" type="date" required />

    <div id="validationError" class="validation-error" style="display:none;"></div>

    <button id="generateBtn" onclick="generateOsdm()" disabled>
      Generer OSDM JSON
    </button>

    <div id="spinnerOsdm" class="spinner"></div>
    <progress id="progressBar" value="0" max="100" style="display:none;"></progress>

    <pre id="finalStatus" class="status-output"></pre>
    <div id="exampleTable"></div>

    <button id="downloadBtn" onclick="downloadOsdm()" disabled>
      Last ned OSDM JSON
    </button>
  </section>

</div>

<script>
let lastGeneratedFile = null;

function show(id) { document.getElementById(id).style.display = "block"; }
function hide(id) { document.getElementById(id).style.display = "none"; }

async function validateTen() {
  const tenStatus = document.getElementById("tenStatus");
  const generateBtn = document.getElementById("generateBtn");

  tenStatus.className = "";
  generateBtn.disabled = true;

  if (!tenFile.files.length) {
    tenStatus.innerText = "Ingen TEN‑CSV valgt";
    tenStatus.classList.add("status-error");
    return;
  }

  show("spinnerTen");

  const fd = new FormData();
  fd.append("tenFile", tenFile.files[0]);

  const r = await fetch("/ui/validate-ten", { method: "POST", body: fd });
  const res = await r.json();

  hide("spinnerTen");

  tenStatus.innerText = JSON.stringify(res, null, 2);
  tenStatus.classList.add(res.ok ? "status-ok" : "status-error");

  generateBtn.disabled = !res.ok;
}


async function generateOsdm() {
  const statusEl = document.getElementById("finalStatus");
  const downloadBtn = document.getElementById("downloadBtn");

  statusEl.className = "";
  downloadBtn.disabled = true;

  show("spinnerOsdm");
  startProgress();

  const fd = new FormData();
  fd.append("exchangeRate", document.getElementById("exchangeRate").value);
  fd.append("validFrom", document.getElementById("validFrom").value);
  fd.append("validTo", document.getElementById("validTo").value);
  fd.append("datasetId", document.getElementById("datasetId").value);
  fd.append("environment", document.getElementById("environment").value);

  const r = await fetch("/ui/generate-osdm", {
    method: "POST",
    body: fd
  });

  const response = await r.json();

  hide("spinnerOsdm");

  // ✅ lagre filnavn for nedlasting
  lastGeneratedFile = response.outputFile || null;

  // ✅ vis status (uten exampleFares)
  const responseForStatus = structuredClone(response);
  if (responseForStatus.summary) {
    delete responseForStatus.summary.exampleFares;
  }

  statusEl.innerText = renderNumberedList(responseForStatus);

  // ✅ RIKTIG OK-deteksjon
  if (response.ok === true) {
    statusEl.classList.add("status-ok");
    downloadBtn.disabled = false;
  } else {
    statusEl.classList.add("status-error");
  }

  // ✅ vis eksempelstrekninger separat
  renderExampleTable(response.summary?.exampleFares);
}


function downloadOsdm() {
  if (!lastGeneratedFile) return;
  window.location.href = `/ui/download-osdm/${lastGeneratedFile}`;
}

function startProgress() {
  const bar = document.getElementById("progressBar");
  bar.style.display = "block";

  const timer = setInterval(async () => {
    const r = await fetch("/ui/progress");
    const p = await r.json();

    bar.value = p.percent;
    if (p.status === "done") {
      clearInterval(timer);
      setTimeout(() => bar.style.display = "none", 500);
    }
  }, 500);
}

function renderExampleTable(exampleFares) {
  const el = document.getElementById("exampleTable");

  if (!exampleFares || Object.keys(exampleFares).length === 0) {
    el.innerHTML = "";
    return;
  }

  let html = `
    <table class="example-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Strekning</th>
          <th>Pris</th>
          <th>Avstand</th>
        </tr>
      </thead>
      <tbody>
  `;

  let idx = 1;
  for (const value of Object.values(exampleFares)) {
    // Eksempel:
    // "Oslo S → Bergen stasjon: 114.40 EUR (502 km)"
    const [routePart, rest] = value.split(": ");
    const [pricePart, kmPart] = rest.split(" (");

    html += `
      <tr>
        <td>${idx}</td>
        <td>${routePart}</td>
        <td>${pricePart}</td>
        <td>${kmPart.replace(")", "")}</td>
      </tr>
    `;
    idx++;
  }

  html += `
      </tbody>
    </table>
  `;

  el.innerHTML = html;
}
</script>

</body>
</html>
