<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <title>Layout-preview – PopToOSDM</title>
  <link rel="stylesheet" href="/static/styles.css?v=10">
  <style>
    /* ------------------------------------------------------------------ */
    /* Variantveksler øverst                                                */
    /* ------------------------------------------------------------------ */
    #variant-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: #000; color: #fff;
      display: flex; align-items: center; gap: 0; height: 40px;
      font-family: -apple-system, sans-serif; font-size: 0.85rem;
    }
    #variant-bar span { padding: 0 1rem; color: rgba(255,255,255,0.5); }
    #variant-bar button {
      flex: 1; height: 40px; background: #111; color: rgba(255,255,255,0.6);
      border: none; border-right: 1px solid #333; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; letter-spacing: 0.03em;
      transition: background 0.15s, color 0.15s;
    }
    #variant-bar button:hover { background: #222; color: #fff; }
    #variant-bar button.active { background: #ff5959; color: #fff; }
    body { padding-top: calc(8rem + 40px) !important; }

    /* ================================================================== */
    /* VARIANT A – Full-bredde dashboard                                   */
    /* ================================================================== */
    body.v-a .container {
      max-width: none;
      padding: 2rem 2.5rem;
    }
    body.v-a .panel {
      border-top: none;
      border-left: 3px solid var(--coral);
      border-radius: 6px;
    }

    /* ================================================================== */
    /* VARIANT B – Mørk overflate, venstrejustert                          */
    /* ================================================================== */
    body.v-b {
      background: #0b0e2a;
    }
    body.v-b .app-header {
      background: #0b0e2a;
    }
    body.v-b .container {
      max-width: 960px;
      margin: 0;
      padding: 2.5rem 3rem;
    }
    body.v-b .panel {
      background: #181c56;
      border-top: none;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }

    /* ================================================================== */
    /* VARIANT C – Enhetlig mørk skal, sentrert smal kolonne               */
    /* ================================================================== */
    body.v-c {
      background: #101235;
    }
    body.v-c .app-header {
      background: #101235;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    body.v-c .sidebar {
      border-right: none;
    }
    body.v-c .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }
    body.v-c .panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-top: none;
      border-radius: 10px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    body.v-c .panel h2 {
      color: rgba(255,255,255,0.9);
    }

    /* ================================================================== */
    /* VARIANT D – Full bredde (A) + enhetlig mørk skal (C)               */
    /* ================================================================== */
    body.v-d {
      background: #101235;
    }
    body.v-d .app-header {
      background: #101235;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    body.v-d .sidebar {
      border-right: none;
    }
    body.v-d .container {
      max-width: none;
      padding: 2rem 2.5rem;
    }
    body.v-d .panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-top: none;
      border-left: 3px solid var(--coral);
      border-radius: 6px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
  </style>
</head>
<body class="v-a">

<!-- Variantveksler -->
<div id="variant-bar">
  <span>Layout:</span>
  <button class="active" onclick="setVariant('a', this)">A – Full bredde</button>
  <button onclick="setVariant('b', this)">B – Mørk, venstrejustert</button>
  <button onclick="setVariant('c', this)">C – Enhetlig skal, sentrert</button>
  <button onclick="setVariant('d', this)">D – Full bredde + enhetlig skal</button>
</div>

<!-- Sidebar -->
<nav class="sidebar">
  <a href="#" class="sidebar-brand">Pop<span class="sidebar-to">To</span>OSDM</a>
  <div class="sidebar-nav">
    <a href="#" class="sidebar-link active">Generer OSDM</a>
    <a href="#" class="sidebar-link">OSDM → Excel</a>
    <a href="#" class="sidebar-link">Legg til rabatt</a>
  </div>
</nav>

<!-- Header -->
<header class="app-header">
  <span class="lang-selector">
    <button class="lang-btn">🇳🇴</button>
    <button class="lang-btn">🇬🇧</button>
    <span class="lang-sep">|</span>
    <a href="#" class="logout-button">Logg ut</a>
  </span>
  <div style="display:flex; justify-content:center; align-items:center; padding:1rem 0 0;">
    <svg width="440" height="88" viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="22" r="9" fill="#ff5959"/>
      <line x1="23" y1="22" x2="35" y2="22" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-dasharray="3 2"/>
      <circle cx="44" cy="22" r="7" fill="none" stroke="white" stroke-width="2.5"/>
      <text x="60" y="29" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-weight="800" font-size="21" fill="white">Pop<tspan fill="#ff5959">To</tspan>OSDM</text>
    </svg>
  </div>
</header>

<!-- Innhold -->
<div class="container">

  <section class="panel">
    <h2>1. Input</h2>
    <label>TEN-CSV</label>
    <input type="file" accept=".csv" />
  </section>

  <section class="panel">
    <h2>2. Generer OSDM</h2>

    <label>DeliveryId</label>
    <input type="text" placeholder="f.eks. 8.0" />

    <label>Miljø</label>
    <select>
      <option>Produksjon</option>
      <option>Test</option>
    </select>

    <label>Valutakurs NOK → EUR</label>
    <input type="number" value="0.091" step="0.0001" />

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:1.25rem;">
      <div>
        <label>Gyldig fra</label>
        <input type="date" />
      </div>
      <div>
        <label>Gyldig til</label>
        <input type="date" />
      </div>
    </div>

    <button style="margin-top:1.5rem; background:#ff5959; color:white; border:none; border-radius:8px; padding:0.65rem 2rem; font-size:1rem; font-weight:600; cursor:pointer;">
      Generer OSDM JSON
    </button>
  </section>

</div>

<script>
  function setVariant(v, btn) {
    document.body.className = 'v-' + v;
    document.querySelectorAll('#variant-bar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
</script>
</body>
</html>
